<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор вклада</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 40px 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #4a5568; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #28a745; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #218838; }
        #result { margin-top: 25px; padding: 15px; background: #e9f7ef; border-radius: 8px; display: none; text-align: center; }
        .res-val { font-size: 24px; font-weight: bold; color: #28a745; }
        .link { display: block; margin-top: 25px; color: #007bff; text-decoration: none; font-weight: bold; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 Мои накопления</h2>
    
    <label>Сумма вклада (₽)</label>
    <input type="number" id="sum" value="100000">
    
    <label>Срок вклада (месяцев)</label>
    <input type="number" id="months" value="12">
    
    <label>Ставка (% годовых)</label>
    <input type="number" id="percent" value="16">
    
    <button onclick="calculate()">ПОСЧИТАТЬ ДОХОД</button>
    
    <div id="result">
        <div>Через <span id="res-mo"></span> мес. у вас будет:</div>
        <div class="res-val" id="total">0</div>
    </div>

    <a href="pass.html" class="link">👉 Перейти к Генератору паролей</a>
</div>

<script>
function calculate() {
    let s = parseFloat(document.getElementById('sum').value);
    let m = parseInt(document.getElementById('months').value);
    let p = parseFloat(document.getElementById('percent').value) / 100 / 12;
    let total = s * Math.pow((1 + p), m);
    document.getElementById('res-mo').innerText = m;
    document.getElementById('total').innerText = total.toLocaleString('ru-RU', {maximumFractionDigits: 0}) + ' ₽';
    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
