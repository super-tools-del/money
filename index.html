<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор дохода</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; text-align: center; }
        .box { max-width: 400px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .link { display: block; margin-top: 20px; color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <h2>💰 Калькулятор вклада</h2>
    <input type="number" id="s" value="100000">
    <input type="number" id="m" value="12">
    <input type="number" id="p" value="16">
    <button onclick="let res = s.value * Math.pow((1 + p.value/100/12), m.value); alert('Итого: ' + res.toFixed(0))">ПОСЧИТАТЬ</button>
