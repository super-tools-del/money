<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей PRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 40px 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .result-area { background: #f8f9fa; border: 2px solid #e2e8f0; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        #passOut { width: 100%; border: none; background: none; font-size: 22px; font-family: monospace; font-weight: bold; color: #2d3748; outline: none; text-align: center; word-break: break-all; }
        .strength-label { font-size: 14px; font-weight: bold; margin-top: 10px; display: block; }
        .bar-bg { height: 6px; background: #edf2f7; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        #bar { height: 100%; width: 0%; transition: 0.4s; }
        .settings { margin: 25px 0; border-top: 1px solid #eee; padding-top: 20px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 15px; }
        input[type="range"] { width: 100%; cursor: pointer; margin: 10px 0; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .gen-btn { background: #3182ce; color: white; }
        .copy-btn { background: #edf2f7; color: #4a5568; }
        .link { display: block; margin-top: 25px; color: #007bff; text-decoration: none; font-weight: bold; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Генератор паролей</h2>
    <div class="result-area">
        <input type="text" id="passOut" readonly>
        <span class="strength-label" id="statusText">Надежность</span>
        <div class="bar-bg"><div id="bar"></div></div>
    </div>
    <div class="settings">
        <div class="row"><span>Длина: <b id="lenVal">12</b></span></div>
        <input type="range" id="length" min="6" max="40" value="12" oninput="update()">
        <div class="row"><span>Цифры (0-9)</span><input type="checkbox" id="c_num" checked onchange="update()"></div>
        <div class="row"><span>Строчные (a-z)</span><input type="checkbox" id="c_low" checked onchange="update()"></div>
        <div class="row"><span>Заглавные (A-Z)</span><input type="checkbox" id="c_up" checked onchange="update()"></div>
        <div class="row"><span>Символы (!@#$)</span><input type="checkbox" id="c_sym" checked onchange="update()"></div>
    </div>
    <div class="btn-group">
        <button class="gen-btn" onclick="update()">ОБНОВИТЬ</button>
        <button class="copy-btn" onclick="copy()">КОПИРОВАТЬ</button>
    </div>

    <a href="index.html" class="link">👈 Вернуться к Калькулятору</a>
</div>

<script>
function update() {
    const len = document.getElementById('length').value;
    document.getElementById('lenVal').innerText = len;
    
    let pool = "";
    let score = 0;
    if (document.getElementById('c_low').checked) { pool += "abcdefghijklmnopqrstuvwxyz"; score++; }
    if (document.getElementById('c_up').checked) { pool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ"; score++; }
    if (document.getElementById('c_num').checked) { pool += "0123456789"; score++; }
    if (document.getElementById('c_sym').checked) { pool += "!@#$%^&*()_-+="; score++; }
    
    if (pool === "") { document.getElementById('passOut').value = "Выбери настройки!"; return; }

    let p = "";
    for (let i = 0; i < len; i++) p += pool.charAt(Math.floor(Math.random() * pool.length));
    document.getElementById('passOut').value = p;

    let strength = (len * 2) + (score * 15); 
    let color = "#f56565"; let text = "Слабый пароль";
    if (strength > 50) { color = "#ecc94b"; text = "Средняя надежность"; }
    if (strength > 75) { color = "#48bb78"; text = "Отличный пароль"; }

    const bar = document.getElementById('bar');
    bar.style.width = Math.min(strength, 100) + "%";
    bar.style.background = color;
    document.getElementById('statusText').innerText = text;
    document.getElementById('statusText').style.color = color;
}
function copy() {
    let out = document.getElementById('passOut');
    out.select();
    document.execCommand("copy");
    alert("Пароль скопирован!");
}
update();
</script>

</body>
</html>
